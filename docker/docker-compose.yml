services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "4321:4321"
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    restart: unless-stopped

volumes:
  node_modules:
